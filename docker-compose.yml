services:
  agentic-assistent:
    build: .
    image: agentic-assistent:latest
    container_name: agentic-assistent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    # STORAGE_BACKEND=postgres is forced here, but this compose file bundles NO
    # Postgres service — .env must provide DATABASE_URL pointing at an external
    # database (e.g. Neon; see README "Postgres storage"). API_TOKEN must also
    # be set in .env: the server refuses to start unauthenticated on 0.0.0.0.
    environment:
      STORAGE_BACKEND: postgres
      # Persist the ~2GB embedding model on the host (./models) so container
      # rebuilds don't re-download it from HF Hub on first use.
      FASTEMBED_CACHE_PATH: /app/models/fastembed
    volumes:
      - ${HOME}/.codex:/home/assistant/.codex
      - ./memory:/app/memory
      - ./models:/app/models
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
