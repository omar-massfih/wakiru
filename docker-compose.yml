services:
  agentic-assistent:
    build: .
    image: agentic-assistent:latest
    container_name: agentic-assistent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
      - path: .env.local
        required: false
    # DATABASE_URL comes from .env.local (Neon); API_TOKEN from .env (required: the
    # server won't start unauthenticated on 0.0.0.0).
    environment:
      STORAGE_BACKEND: postgres
      FASTEMBED_CACHE_PATH: /app/models/fastembed  # persist the ~2GB model across rebuilds
    volumes:
      - ${HOME}/.codex:/home/assistant/.codex
      - ./memory:/app/memory
      - ./models:/app/models
    # /health is unauthenticated; a hung-but-alive process flips to unhealthy.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
