services:
  agentic-assistent:
    build: .
    image: agentic-assistent:latest
    container_name: agentic-assistent
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      STORAGE_BACKEND: postgres
    volumes:
      - ${HOME}/.codex:/home/assistant/.codex
      - ./memory:/app/memory
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
