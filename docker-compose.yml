services:
  agentic-assistent:
    build: .
    image: agentic-assistent:latest
    container_name: agentic-assistent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    # No bundled Postgres service — .env must supply DATABASE_URL (e.g. Neon)
    # and API_TOKEN (required: the server won't start unauthenticated on 0.0.0.0).
    environment:
      STORAGE_BACKEND: postgres
      FASTEMBED_CACHE_PATH: /app/models/fastembed  # persist the ~2GB model across rebuilds
    volumes:
      - ${HOME}/.codex:/home/assistant/.codex
      - ./memory:/app/memory
      - ./models:/app/models
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
