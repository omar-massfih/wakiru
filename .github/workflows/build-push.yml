# Build the arm64 image (the omar node is aarch64), push to ghcr.io, then bump
# the pinned image tag in the platform repo's kustomization so Flux rolls it out.
name: build-push
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/omar-massfih/agentic-assistent

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04-arm    # native arm64; avoids slow QEMU for the heavy ML deps
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # Immutable, traceable tag computed once and reused by the bump job.
      - id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # GITHUB_TOKEN cannot push to another repo; PLATFORM_REPO_TOKEN is a PAT
      # with contents:write on omar-massfih/platform.
      - uses: actions/checkout@v4
        with:
          repository: omar-massfih/platform
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          path: platform

      # Point only the agentic image at the new tag: rewrite the newTag on the
      # line that follows this image's `name:`. awk keeps the diff to that one
      # line (blank lines, comments, and the other apps' tags all preserved).
      - name: Set image tag in kustomization
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          cd platform
          awk -v tag="$TAG" '
            f && /newTag:/ { sub(/newTag:.*/, "newTag: \"" tag "\""); f=0 }
            /name: ghcr\.io\/omar-massfih\/agentic-assistent[[:space:]]*$/ { f=1 }
            { print }
          ' k8s/kustomization.yaml > k8s/kustomization.yaml.tmp
          mv k8s/kustomization.yaml.tmp k8s/kustomization.yaml
          git -C . diff --stat

      - name: Commit and push
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          cd platform
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "agentic-assistent: deploy ${TAG}" || exit 0
          git pull --rebase && git push
